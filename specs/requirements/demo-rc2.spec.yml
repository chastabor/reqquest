  futureCareerInterestApplicantPrompt:
    title: Future Interest
    description: Please describe your future dev/ops career interests.
    model: FutureCareerInterestApplicantPrompt
    ui:
      form:
        fields:
          - FieldTextInput:
              path: interests
              labelText: "Future Interests"
    validate:
      rules:
