# =============================================================================
# ReqQuest Specification — demo "rc2"
# =============================================================================

specVersion: 2
project:
  id: rc2
  name: Technical Mentorship Experience
  multipleRequestsPerPeriod: false

# =============================================================================
# MODELS
# =============================================================================
models:

  GPAPrompt:
    group: common
    properties:
      gpa: number

  GPAConfig:
    group: common
    required: [minGPA]
    properties:
      minGPA: number

  AvailableHoursPerWeekPrompt:
    group: common
    required: [minHours, maxHours]
    properties:
      minHours: number
      maxHours: number

  AvailableHoursPerWeekConfig:
    group: common
    required: [minHours, maxHours]
    properties:
      minHours: number
      maxHours: number

  ParticipationAcknowledgementPrompt:
    group: common
    required: [acknowledged]
    properties:
      acknowledged: boolean

  AbilityToAutomateTasksApplicantPrompt:
    group: operations
    required: [isAutomated]
    properties:
      isAutomated: boolean
      descriptionOfAutomation: string

  AbilityToAutomateTasksReviewerPrompt:
    group: operations
    required: [isSuited]
    properties:
      isSuited: boolean
      comment: string

  FutureCareerInterestApplicantPrompt:
    group: operations
    required: [interests]
    properties:
      interests: string

  RatingLevels5:
    group: common
    kind: referenceData
    shape: { value: string, label: string }
    fixture: specs/resources/data/rating_levels_5.yml

  FutureCareerInterestReviewerPrompt:
    group: operations
    properties:
      rating:     { enum: RatingLevels5 }
      ratingName: { enum: RatingLevels5, by: label }

  UploadInfo:
    group: common
    required: [_type, multipartIndex, name, mime, size]
    properties:
      _type:          string
      multipartIndex: number
      name:           string
      mime:           string
      size:           number
      shasum:         string

  # Under operations w/note: (Shared - All programs)
  RecommendationLetterApplicantPrompt:
    group: common
    properties:
      letter: UploadInfo

  RecommendationLetterReviewerPrompt:
    group: common
    properties:
      letter:
        properties:
          rating:     { enum: RatingLevels5 }
          ratingName: { enum: RatingLevels5, by: label }


  # ---- Software Development -----

  LogicalThinkingApplicantPrompt:
    group: software-development
    required: [solution]
    properties:
      solution: string
      documentation: UploadInfo

  LogicalThinkingReviewerPrompt:
    group: software-development
    required: [scored]
    properties:
      scored: number
      explanation: string

  InterestInBuildingApplicantPrompt:
    group: software-development
    required: [isContributed]
    properties:
      isContributed: boolean
      recap: string

  InterestInBuildingReviewerPrompt:
    # Must be passionate about development outside of a classroom setting.
    group: software-development
    required: [isInterested]
    properties:
      isInterested: boolean
      explanation: string

  CreativeProblemSolvingApplicantPrompt:
    group: software-development
    required: [issueAndSolution]
    properties:
      issueAndSolution: string

  CreativeProblemSolvingReviewerPrompt:
    group: software-development
    required: [issueReal, solutionFeasible]
    properties:
      isIssueReal: boolean
      isSolutionFeasible: boolean

  # ---- Project Management -----

  OrganizationApplicantPrompt:
    group: project-management
    required: [orchestration]
    properties:
      orchestration: string

  OrganizationReviewerPrompt:
    group: project-management
    required: [isOrchestrated]
    properties:
      isOrchestrated: boolean

  CommunicationApplicantPrompt:
    # Must be able to facilitate conversations between team members.
    group: project-management
    properties:
      # Prompt: You are leading a group project.
      # One teammate is doing all the work,
      # and another hasn't responded to texts in three days.
      # How do you handle this scenario?
      arbitration: string

  CommunicationReviewerPrompt:
    group: project-management
    properties:
      # Prompt: Is the applicant’s communication clear and structured?
      # (Yes/No)
      isArbitor: boolean

  # Reviewer Only
  AttentionToDetailAssessmentReviewerPrompt:
    # Must demonstrate overall attention to detail in communications and documents.
    # Requirement: Assess all applicant submitted answers and materials.
    group: project-management
    properties:
      # Prompt: Does the applicant follow instructions?
      # (Yes/No)
      isCompliant: boolean
      # Do their materials have frequent spelling or grammar errors?
      # (Yes/No)
      isProofread: boolean

  # ---- Application Management and Support -----

  AttentionToDetailApplicantPrompt:
    group: application-support
    properties:
      # Input: Describe a time you had to check something carefully
      # for mistakes or accuracy.
      detailed: string

  AttentionToDetailReviewerPrompt:
    group: application-support
    properties:
      # Prompt: Does the applicant demonstrate attention to detail?
      # (Yes/No)
      isDetailed: boolean

  ProcessAdherenceApplicantPrompt:
    group: application-support
    properties:
      # Input: Describe a time you had to follow detailed instructions
      # to complete a task.
      adherance: string

  ProcessAdherenceReviewerPrompt:
    group: application-support
    properties:
      # Prompt: Can the applicant follow and validate a process?
      # (Yes/No)
      isAttentive: boolean

  WrittenCommunicationApplicantPrompt:
    group: application-support
    properties:
      # Input: Write a short set of instructions explaining how to
      # complete a simple task
      # (e.g., submit an assignment, reset a password).
      instructions: string

  WrittenCommunicationReviewerPrompt:
    group: application-support
    properties:
      # Prompt: Is the applicant’s writing clear and easy to follow?
      # (Yes/No)
      isWellDefined: boolean

# =============================================================================
# PROMPTS
# =============================================================================
prompts:

  # ---- Common -----
  minimumGPAPrompt:
    title: Minimum GPA
    description: >
      The minimum GPA that must be met for some programs.
    model: GPAPrompt
    ui:
      form:
        fields:
          - FieldNumber:
              path: gpa
              labelText: "GPA"
              helperText: "You current GPA"
      display:
        text: "{{ gpa }} GPA"
    validate:
      rules:
        - { field: gpa, required: true,
            message: "Please enter your current GPA."}

  availableHoursPerWeekPrompt:
    title: Available Hours Per Week
    description: >
      Available Hours per Week to participate in the program.
    model: AvailableHoursPerWeekPrompt
    ui:
      form:
        fields:
          - FieldNumber:
              path: minHours
              labelText: "Min Hours"
              helperText: "Minimum number of Available Hours per Week"
          - FieldNumber:
              path: maxHours
              labelText: "Max Hours"
              helperText: "Maximum number of Available Hours per Week"
      display:
        text: "{{ minHours }} to {{ maxHours}} number of Hours Available per Week"
    validate:
      rules:
        - { field: minHours, required: true,
          message: "Please enter the minimum number of hours you are available per week."}
        - { field: maxHours, min: 0,
            message: "Please enter a valid minimum number of hours."}
        - { field: maxHours, required: true,
          message: "Please enter the maximum number of hours you are available per week."}
        - { field: maxHours, min: "minHours",
            message: "Please enter a maximum number of Hours equal to or greater than minimum number of Hours."}

  participationAcknowledgementPrompt:
    title: Acknowledgement of participation expectations
    description: >
      Please acknowledge the expectation of your participation.
    model: ParticipationAcknowledgementPrompt
    ui:
      form:
        fields:
          - FieldRadio:
              path: acknowledged
              boolean: true
              legendText: "Applicant acknowledges participation expectations."
              items: [{ label: Yes, value: true }, { label: No, value: false }]

  recommendationLetterApplicantPrompt:
    title: Recommendation Letter
    description: >
      Provide a recommendation letter from a past
      or current TXST professor.
    model: RecommendationLetterApplicantPrompt
    ui:
      form:
        # B: DocumentSet template — emits one FieldUpload per entry.
        template: DocumentSet
        props:
          documents:
            - { path: letter, label: "Faculty Recommendation Letter" }
      display:
        template: DocumentSetDisplay
        props:
          documents:
            - { path: letter, label: "Recommendation Letter" }
    preValidate:
      # C: per-field upload size check, declared for each file.
      rules:
        - { field: letter, maxSize: "10MB",
            message: "This document is too large, please upload a file less than 10MB." }
    preProcessData: true              # author hashes uploads + writes shasum
    validate:
      rules:
        - { field: letter, required: true, message: "Please upload your recommendation letter from faculty." }

  recommendationLetterReviewerPrompt:
    title: Recommendation Letter Review
    description: Rate the strength of the faculty recommendation letter.
    model: RecommendationLetterReviewerPrompt
    fetch: RatingLevels5
    ui:
      form:
        template: RateReviewSet
        props:
          listKey: ratingLevels5
          required: true
          items:
            - { path: letter,
                label: "Faculty recommendation letter rating" }
      display:
        template: RateReviewSetDisplay
        props:
          items:
            - { path: letter,
                label: "Faculty recommendation letter rating" }
    validate:
      rules:
        - { field: letter.rating, required: true,
            message: "Please rate the faculty recommendation letter." }
        - { field: letter.ratingName, equalsLabelOf: letter.rating, source: RatingLevels5,
            message: "Rating level does not match rating entry." }
    # invalidates:
    #   # Declarative form (when `dynamic` would otherwise be needed): if any
    #   # `<x>.rating === false`, mark the upload prompt invalid.
    #   whenAnyFalse: [letter.rating]
    #   targets:
    #     - { promptId: recommendationLetterApplicantPrompt,
    #         reason: "Recommendation letter is invalid. Please re-upload." }
    # revalidates:
    #   whenAllTrue: [letter.rating]
    #   targets: [RecommendationLetterApplicantPrompt]


  # ---- Operations & Infrastructure -----
  abilityToAutomateTasksApplicantPrompt:
    title: Ability to Automate Tasks
    description: Describe your ability to automate manual, repetitive tasks.
    model: AbilityToAutomateTasksApplicantPrompt
    ui:
      form:
        fields:
          - FieldRadio:
              path: isAutomated
              boolean: true
              labelText: "Have you ever written a script to automate a repetitive task?"
              items: [{ label: Yes, value: true }, { label: No, value: false }]
          - FieldTextInput:
              path: descriptionOfAutomation
              labelText: >
                Describe the task(s) that you've automated and why.
                Feel free to include any links if this is already documented.
              conditional: "isAutomated === true"
    validate:
      rules:
        - { field: isAutomated, required: true, message: "Please choose an option."}

  abilityToAutomateTasksReviewerPrompt:
    title: Review Ability to Automate Tasks
    description: Applicant must have the ability to automate manual, repetitive tasks.
    model: AbilityToAutomateTasksReviewerPrompt
    ui:
      form:
        fields:
          - FieldRadio:
              path: isSuited
              boolean: true
              labelText: "Did the applicant select an appropriate task(s) for automation?"
              items: [{ label: Yes, value: true }, { label: No, value: false }]
          - FieldTextInput:
              path: comment
              labelText: "Add any notable comments about their script"
              conditional: "isSuited === true"
    validate:
      rules:
        - { field: isSuited, required: true, message: "Please review approval of automation."}

  futureCareerInterestApplicantPrompt:
    title: Future Interest
    description: Must have a future interest in having a career in dev/ops.
    model: FutureCareerInterestApplicantPrompt
    ui:
      form:
        fields:
          - FieldTextInput:
              path: interests
              labelText: "What interests you most about operations as a career?"
    validate:
      rules:
        - { field: interests, required: true, message: "Please describe your future dev/ops career interests." }

  futureCareerInterestReviewerPrompt:
    title: Rate applicants career interests
    description: Rate the applicants future dev/ops career interests.
    model: FutureCareerInterestReviewerPrompt
    fetch: RatingLevels5
    ui:
      form:
        template: SelectValueLabel
        props:
          path: rating
          labelPath: ratingName
          labelText: Rating
          required: true
          listKey: ratingLevels5
      display:
        text: "{{ ratingName ?? rating }}"
    validate:
      rules:
        - { field: rating, required: true, message: "Score the free text response." }
        - { field: ratingName, equalsLabelOf: rating, source: RatingLevels5,
            message: "Rating level does not match rating entry." }

  # ---- Software Development -----
  logicalThinkingApplicantPrompt:
    title: Logical Thinking
    description: >
      You're building a 'Seat Finder' for the dining hall.
      In plain English (or pseudocode), describe how you would sort
      a list of tables to show the user the ones that are both empty
      and closest to the entrance. Note: You may make up data to
      support your solution.
    model: LogicalThinkingApplicantPrompt
    ui:
      form:
        # B: DocumentSet template — emits one FieldUpload per entry.
        template: DocumentSet
        props:
          documents:
            - { path: documentation,
                label: "Supporting pseudocode documentation.",
                textInput: {
                  path: solution,
                  labelText: "Please enter solution."
                }
              }
      display:
        template: DocumentSetDisplay
        props:
          documents:
            - { path: documentation, label: "Supporting pseudocode documentation." }
    preValidate:
      # C: per-field upload size check, declared for each file.
      rules:
        - { field: documentation, maxSize: "10MB",
            message: "This document is too large, please upload a file less than 10MB." }
    preProcessData: true              # author hashes uploads + writes shasum
    validate:
      rules:
        - { field: solution, required: true, message: "Please describe your solution to the problem." }

  logicalThinkingReviewerPrompt:
    title: Acknowledgement of participation expectations
    description: >
      Assess the applicant's solution.
      Applicant must be able to understand what data is needed
      to solve a request and structure it logically.
    model: LogicalThinkingReviewerPrompt
    ui:
      form:
        fields:
          - FieldRadio:
              path: scored
              number: true
              legendText: "Applicant acknowledges participation expectations."
              items: [{ label: "Worst", value: 1 }, { label: "Below Average", value: 2 }, { label: "Average", value: 3 }, { label: "Above Average", value: 4 }, { label: "Best", value: 5 }]
          - FieldTextInput:
              path: explanation
              labelText: "Explain your score."
    validate:
      rules:
        - { field: scored, required: true, message: "Score the free text response." }
        - { field: scored, oneOf: [1, 2, 3, 4, 5], message: "Score does not match rating range." }

  interestInBuildingApplicantPrompt:
    title: Interest In Building
    # Provide an example of participation in a software development project that was not for class credit.
    description: >
      Apart from required class assignments, have you ever independently built,
      modified, or contributed to a software project (e.g., a personal website,
      a game, a script to automate a task, or a contribution to an Open Source
      project) and successfully resolved a technical bug or error that initially
      prevented it from working?
    model: InterestInBuildingApplicantPrompt
    ui:
      form:
        fields:
          - FieldRadio:
              path: isContributed
              boolean: true
              labelText: "Independent contributions?"
              # (Yes/No; yes triggers additional fields to answer, no triggers warning)
              items: [{ label: Yes, value: true }, { label: No, value: false }]
          - FieldTextInput:
              path: recap
              labelText: >
                Describe the project you worked on and issues you encountered.
                If using GitHub, please include a link to your account.
                (free text field)
              conditional: "isContributed === true"
    validate:
      rules:
        - { field: isContributed, required: true, message: "Please choose an option."}

  interestInBuildingReviewerPrompt:
    # Assess the applicant’s stated contribution to software.
    title: Review Interest In Building
    description: >
      The applicant mus provide an example of participation in a
      software development project that was not for class credit.
    model: InterestInBuildingReviewerPrompt
    ui:
      form:
        fields:
          - FieldRadio:
              path: isInterested
              boolean: true
              labelText: "Does the applicant show interest in building or creating technical solutions?"
              items: [{ label: Yes, value: true }, { label: No, value: false }]
          - FieldTextInput:
              path: explanation
              labelText: "Explain your score"
    validate:
      rules:
        - { field: isInterested, required: true, message: "Please score applicant interest in building."}
        - { field: explanation, required: true, message: "Please explain your score."}

  creativeProblemSolvingApplicantPrompt:
    # Demonstrate ability to assess websites/application weaknesses
    # and think through solutions.
    title: Creative Problem Solving
    description: >
      What is one website or app you use for school that frustrates you?
      If you were the developer, what one feature would you add or change
      to make it easier for students to use?
    model: CreativeProblemSolvingApplicantPrompt
    ui:
      form:
        fields:
          - FieldTextInput:
              path: issueAndSolution
              labelText: "Issue and Solution"
    validate:
      rules:
        - { field: issueAndSolution, required: true, message: "Please fill in with solution."}

  creativeProblemSolvingReviewerPrompt:
    title: Creative Problem Solving Review
    description: >
      The applicant must be able to analyze shortcomings in
      current technologies and consider alternate solutions.
      Assess the validity of the reported issue and solution.
    model: CreativeProblemSolvingReviewerPrompt
    ui:
      form:
        fields:
          - FieldRadio:
              path: isIssueReal
              boolean: true
              labelText: "Is the issue real?"
              items: [{ label: Yes, value: true }, { label: No, value: false }]
          - FieldRadio:
              path: isSolutionFeasible
              boolean: true
              labelText: "Is the proposed feature/change technologically feasible?"
              items: [{ label: Yes, value: true }, { label: No, value: false }]
    validate:
      rules:
        - { field: isIssueReal, required: true, message: "Please choose an option."}
        - { field: isSolutionFeasible, required: true, message: "Please choose an option."}

  # ---- Project Management -----

  organizationApplicantPrompt:
    title: Organization
    description: >
      Describe a time you had to organize tasks or
      coordinate something (school, event, group project, etc.).
    model: OrganizationApplicantPrompt
    ui:
      form:
        fields:
          - FieldTextInput:
              path: orchestration
              labelText: "Organization"
    validate:
      rules:
        - { field: orchestration, required: true, message: "Please fill about organization/coordination tasks."}

  organizationReviewerPrompt:
    title: Organization Review
    description: "Does the applicant demonstrate organization and task management?"
    model: OrganizationReviewerPrompt
    ui:
      form:
        fields:
          - FieldRadio:
              path: isOrchestrated
              boolean: true
              labelText: "Satisfies organization/coordination of tasks?"
              items: [{ label: Yes, value: true }, { label: No, value: false }]
    validate:
      rules:
        - { field: isOrchestrated, required: true, message: "Please choose an option."}

  # ---- Application Management and Support -----

# =============================================================================
# REQUIREMENTS
# =============================================================================
requirements:

  # ---- Common -----
  minimumGPAReq:
    phase: PREQUAL
    title: Minimum GPA
    navTitle: Min GPA
    description: Minumum GPA to qualify for specific Programs.
    prompts: [minimumGPAPrompt]
    resolve:
      rules:
        - { when: "minimumGPAPrompt.gpa == null", status: PENDING }
        - { when: "minimumGPAPrompt.gpa >= config.minGPA",
            status: MET }
        - { else: true, status: DISQUALIFYING,
            reason: "You must have a minimum GPA of {{config.minGPA}} to qualify." }
    configuration:
      model: GPAConfig
      default: { minGPA: 3.0 }
      validate:
        rules:
          - { field: minGPA, required: true,
              message: "Please enter minimum GPA to be met."}
          - { field: minGPA, min: 0.0,
              message: "Please enter a valid minimum GPA."}
      ui:
        configure:
          fields:
            - FieldNumber:
                path: minGPA
                labelText: "Minimum GPA"
                helperText: "What is the minimum GPA to qualify for some programs?"

  availableHoursPerWeekReq:
    phase: PREQUAL
    title: Available Hours/Week
    navTitle: Avail Hrs/Wk
    description: Applicant must be available between a range of hours per week.
    prompts: [availableHoursPerWeekPrompt]
    resolve:
      rules:
        - { when: "availableHoursPerWeekPrompt.minHours == null", status: PENDING }
        - { when: "availableHoursPerWeekPrompt.minHours <= config.minHours", status: DISQUALIFYING,
            reason: "You must be available between {{config.minHours}} and {{config.maxHours}} hours to qualify." }
        - { when: "availableHoursPerWeekPrompt.maxHours == null", status: PENDING }
        - { when: "availableHoursPerWeekPrompt.maxHours >= config.maxHours", status: DISQUALIFYING,
            reason: "You must be available from {{config.minHours}} and {{config.maxHours}} hours to qualify." }
        - { else: true, status: MET }
    configuration:
      model: AvailableHoursPerWeekConfig
      default: { minHours: 5.0, maxHours: 10.0 }
      validate:
        rules:
          - { field: minHours, required: true,
              message: "Please enter minimum Hours to be available."}
          - { field: minHours, min: 0.0,
              message: "Please enter a valid minimum number of Hours."}
          - { field: maxHours, required: true,
              message: "Please enter maximum Hours to be avaialbe."}
          - { field: maxHours, min: "minHours",
              message: "Please enter a maximum number of Hours equal to or greater than minimum number of Hours."}
      ui:
        configure:
          fields:
            - FieldNumber:
                path: minHours
                labelText: "Minimum Hours"
                helperText: "What are the minimum Hours to qualify for some programs?"
            - FieldNumber:
                path: maxHours
                labelText: "Maximum Hours"
                helperText: "What are the maximum Hours to qualify for some programs?"

  participationAcknowledgementReq:
    phase: PREQUAL
    title: Acknowledgement of participation expectations
    navTitle: Acknowledgment
    description: Acknowledgment of the expectation of participation.
    prompts: [participationAcknowledgementPrompt]
    resolve:
      rules:
        - { when: "participationAcknowledgementPrompt.acknowledged == null", status: PENDING }
        - { when: "participationAcknowledgementPrompt.acknowledged", status: MET }
        - { else: true, status: DISQUALIFYING,
            reason: "You must acknowledge the expectation of your participation to qualify." }

  recommendationLetterApplicantReq:
    phase: QUALIFICATION
    title: Recommendation Letter
    navTitle: Letter
    description: Provide a recommendation letter from a past or current TXST professor.
    prompts: [recommendationLetterApplicantPrompt]
    resolve:
      rules:
        - { when: "recommendationLetterApplicantPrompt.letter != null", status: MET }
        - { when: "recommendationLetterApplicantPrompt.letter", status: PENDING }

  recommendationLetterReviewerReq:
    phase: APPROVAL
    title: Assess Recommendation Letter
    description: Rate the strength of the recommendation
    prompts: [recommendationLetterReviewerPrompt]
    resolve:
      rules:
        - { when: "recommendationLetterReviewerPrompt.letter.rating != null", status: MET }
        - { else: true, status: PENDING }

  # ---- Operations & Infrastructure -----
  abilityToAutomateTasksApplicantReq:
    phase: QUALIFICATION
    title: Has applicant automate tasks?
    navTitle: Automation
    description: Have you ever written a script to automate a repetitive task?
    prompts: [abilityToAutomateTasksApplicantPrompt]
    resolve:
      rules:
        - { when: "abilityToAutomateTasksApplicantPrompt.isAutomated == null", status: PENDING }
        - { when: "abilityToAutomateTasksApplicantPrompt.isAutomated", status: MET }
        - { else: true, status: WARNING, reason: "Must show ability to automate tasks." }

  abilityToAutomateTasksReviewerReq:
    phase: APPROVAL
    title: Review of Applicant script ability
    description: Approval of applicant choice of tasks to automate and quality of scripting
    prompts: [abilityToAutomateTasksReviewerPrompt]
    resolve:
      rules:
        - { when: "abilityToAutomateTasksReviewerPrompt.isSuited != null", status: MET }
        - { else: true, status: PENDING }

  futureCareerInterestApplicantReq:
    phase: QUALIFICATION
    title: Describe career in dev/ops interests
    navTitle: Career Interests
    description: What interests you most about operations as a career?
    prompts: [futureCareerInterestApplicantPrompt]
    resolve:
      rules:
        - { when: "futureCareerInterestApplicantPrompt.interests != null", status: MET }
        - { else: true, status: PENDING }

  futureCareerInterestReviewerReq:
    phase: APPROVAL
    title: Rate Career Interest Response
    description: >
      Rate the applicants response.
      Did they show that they have investigated future career paths.
    prompts: [futureCareerInterestReviewerPrompt]
    resolve:
      rules:
        - { when: "futureCareerInterestReviewerPrompt.rating != null", status: MET }
        - { else: true, status: PENDING }


  # ---- Software Development -----

  logicalThinkingApplicantReq:
    phase: QUALIFICATION
    title: Describe solution to a problem to demonstrate logical thinking.
    prompts: [logicalThinkingApplicantPrompt]
    resolve:
      rules:
        - { when: "logicalThinkingApplicantPrompt.solution != null", status: MET }
        - { else: true, status: PENDING }

  logicalThinkingReviewerReq:
    phase: APPROVAL
    title: Score logical solution.
    prompts: [logicalThinkingReviewerPrompt]
    resolve:
      rules:
        - { when: "logicalThinkingReviewerPrompt.scored != null", status: MET }
        - { else: true, status: PENDING }

  interestInBuildingApplicantReq:
    phase: QUALIFICATION
    title: Has applicant contributed to another project?
    navTitle: Automation
    description: Have you ever contributed to another project?
    prompts: [interestInBuildingApplicantPrompt]
    resolve:
      rules:
        - { when: "interestInBuildingApplicantPrompt.isContributed == null", status: PENDING }
        - { when: "interestInBuildingApplicantPrompt.isContributed", status: MET }
        - { else: true, status: WARNING, reason: "Must show interest in building." }

  interestInBuildingReviewerReq:
    phase: APPROVAL
    title: Score interest in building.
    prompts: [interestInBuildingReviewerPrompt]
    resolve:
      rules:
        - { when: "interestInBuildingReviewerPrompt.isInterested != null && interestInBuildingReviewerPrompt.explanation != null", status: MET }
        - { else: true, status: PENDING }

  creativeProblemSolvingApplicantReq:
    phase: QUALIFICATION
    title: Creative Problem Solving
    navTitle: Problem Solving
    description: >
      What is one website or app you use for school that frustrates you?
      If you were the developer, what one feature would you add or change
      to make it easier for students to use?
    prompts: [creativeProblemSolvingApplicantPrompt]
    resolve:
      rules:
        - { when: "creativeProblemSolvingApplicantPrompt.issueAndSolution != null", status: MET }
        - { when: "creativeProblemSolvingApplicantPrompt.issueAndSolution", status: PENDING }

  creativeProblemSolvingReviewerReq:
    phase: APPROVAL
    title: Creative Problem Solving Review
    description: >
      The applicant must be able to analyze shortcomings in
      current technologies and consider alternate solutions.
      Assess the validity of the reported issue and solution.
    prompts: [creativeProblemSolvingReviewerPrompt]
    resolve:
      rules:
        - { when: "creativeProblemSolvingReviewerPrompt.isIssueReal != null && creativeProblemSolvingReviewerPrompt.isSolutionFeasible != null", status: MET }
        - { else: true, status: PENDING }

  # ---- Project Management -----

  organizationApplicantReq:
    phase: QUALIFICATION
    title: Has applicant organized/coordinated tasks?
    navTitle: Organization
    description: >
      Describe a time you had to organize tasks or coordinate
      something (school, event, group project, etc.).
    prompts: [organizationApplicantPrompt]
    resolve:
      rules:
        - { when: "organizationApplicantPrompt.orchestration != null", status: MET }
        - { else: true, status: PENDING }

  organizationReviewerReq:
    phase: APPROVAL
    title: Review of Applicant organization/coordination ability
    description: "Does the applicant demonstrate organization and task management?"
    prompts: [organizationReviewerPrompt]
    resolve:
      rules:
        - { when: "organizationReviewerPrompt.isOrchestrated != null", status: MET }
        - { else: true, status: PENDING }

