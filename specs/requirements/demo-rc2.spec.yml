  # ---- Operations & Infrastructure -----
  abilityToAutomateTasksApplicantPrompt:
    title: Ability to Automate Tasks
    description: Describe your ability to automate manual, repetitive tasks.
    model: AbilityToAutomateTasksApplicantPrompt
    ui:
      form:
        fields:
          - FieldRadio:
              path: automated
              boolean: true
              labelText: "Have you automated manual, repetitive tasks?"
              items: [{ label: Yes, value: true }, { label: No, value: false }]
          - FieldTextInput:
              path: descriptionOfAutomation
              labelText: "Description of Automation"
              conditional: "automated === true"
    validate:
      rules:
        - { field: automated, required: true, message: "Please choose an option."}

  abilityToAutomateTasksReviewerPrompt:
    title: Review Ability to Automate Tasks
    description: Applicant must have the ability to automate manual, repetitive tasks.
    model: AbilityToAutomateTasksReviewerPrompt
    ui:
      form:
        fields:
          - FieldRadio:
              path: suitability
              boolean: true
              labelText: "Did the applicant select an suitable task(s) for automation?"
              items: [{ label: Yes, value: true }, { label: No, value: false }]
          - FieldTextInput:
              path: comment
              labelText: "Comment on Scripting"
              conditional: "suitability === true"
    validate:
      rules:
